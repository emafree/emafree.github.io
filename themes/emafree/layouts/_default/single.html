{{ define "main" }}
<div class="gallery-page">

  <header class="gallery-header">
    <a href="/" class="back-btn">← emafree</a>
    <h1 class="gallery-title">{{ .Title }}</h1>
  </header>

  {{ $images := .Resources.ByType "image" }}

  <div class="photo-grid">
    {{ range $i, $img := $images }}
    <div class="photo-item">
      <a href="{{ $img.RelPermalink }}" class="lb-trigger"
         data-src="{{ $img.RelPermalink }}"
         data-idx="{{ $i }}">
        {{ $thumb := $img.Resize "800x webp q85" }}
        <img src="{{ $thumb.RelPermalink }}"
             alt=""
             loading="lazy" />
      </a>
    </div>
    {{ end }}
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-prev" id="lb-prev">←</button>
  <button class="lb-next" id="lb-next">→</button>
  <div class="lb-inner">
    <img id="lb-img" src="" alt="" />
  </div>
</div>

<script>
(function() {
  const triggers = document.querySelectorAll('.lb-trigger');
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  let current    = 0;

  function open(idx) {
    current = idx;
    lbImg.src = triggers[idx].dataset.src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function move(dir) {
    current = (current + dir + triggers.length) % triggers.length;
    lbImg.src = triggers[current].dataset.src;
  }

  triggers.forEach((t, i) => {
    t.addEventListener('click', e => { e.preventDefault(); open(i); });
  });

  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', () => move(-1));
  document.getElementById('lb-next').addEventListener('click', () => move(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  move(-1);
    if (e.key === 'ArrowRight') move(1);
  });
})();
</script>
{{ end }}
