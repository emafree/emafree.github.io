{{ define "main" }}
<div class="gallery-page">

<div class="gallery-sidebar">
  <a href="/" class="back-btn">← emafree</a>
  <nav class="gallery-nav">
    <ul>
      {{ range .Site.AllPages }}
        {{ if and (eq .Kind "page") (eq .Section "photos") }}
        <li>
          <a href="{{ .RelPermalink }}"
             class="nav-btn {{ if eq .Title $.Title }}nav-btn-current{{ end }}">
            {{ .Title }}
          </a>
        </li>
        {{ end }}
      {{ end }}
    </ul>
  </nav>
</div>

  <div class="photo-slider" id="photo-slider">
    {{ $images := where (.Resources.ByType "image") "Name" "ne" "cover.jpg" }}
    {{ range $i, $img := $images }}
    <div class="slide-item" data-idx="{{ $i }}">
      <img src="{{ $img.RelPermalink }}"
           width="{{ $img.Width }}" 
           height="{{ $img.Height }}"
           alt=""
           loading="lazy" />
    </div>
    {{ end }}
  </div>

</div>

<script>
(function() {
  const slider = document.getElementById('photo-slider');
  const slides = document.querySelectorAll('.slide-item');
  let current = 0;
  let isMoving = false;

  function goToSlide(idx) {
    if (idx < 0 || idx >= slides.length) return;
    isMoving = true;
    current = idx;
    
    slides[current].scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    // Sblocca il controllo dopo la fine dell'animazione di scorrimento
    setTimeout(() => { isMoving = false; }, 600);
  }

  // Gestione della Rotella del Mouse
  window.addEventListener('wheel', e => {
    if (isMoving) return;
    if (e.deltaY > 0) {
      goToSlide(current + 1);
    } else if (e.deltaY < 0) {
      goToSlide(current - 1);
    }
  }, { passive: true });

  // Gestione Tasti Tastiera (Freccia Su/Giù, Pagina Su/Giù)
  document.addEventListener('keydown', e => {
    if (isMoving) return;
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault();
      goToSlide(current + 1);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      goToSlide(current - 1);
    }
  });
})();
</script>
{{ end }}
