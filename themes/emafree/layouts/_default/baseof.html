<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}emafree{{ else }}{{ .Title }} — emafree{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="rotate-overlay" id="rotate-overlay">
    <div class="rotate-message">
      <span class="rotate-icon">⟳</span>
      <p>Ruota il telefono<br>per una migliore esperienza</p>
    </div>
  </div>

  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <div class="mobile-menu" id="mobile-menu">
    <a href="/" class="mobile-menu-back">← emafree</a>
    <nav>
      <ul>
        {{ range where .Site.AllPages "Kind" "page" }}
          {{ if eq .Section "photos" }}
          <li><a href="{{ .RelPermalink }}" class="mobile-menu-link">{{ .Title }}</a></li>
          {{ end }}
        {{ end }}
      </ul>
    </nav>
  </div>

  {{ block "main" . }}{{ end }}

  <script>
  (function() {
    var overlay = document.getElementById('rotate-overlay');
    function checkRotate() {
      if (window.innerWidth < 900 && window.innerHeight > window.innerWidth) {
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = '';
      }
    }
    checkRotate();
    window.addEventListener('resize', checkRotate);

    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', function() {
      btn.classList.toggle('open');
      menu.classList.toggle('open');
    });
    menu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        btn.classList.remove('open');
        menu.classList.remove('open');
      });
    });
  })();
  </script>
</body>
</html>
